descriptionRoleUser: >-
  Имеет право только на просмотр страниц жилья и бронирования без возможности редактирования.
descriptionRoleAdmin: >-
  Полный доступ ко всем разделам приложения.
descriptionRoleManager: >-
  Почти такие же права, что и у администратора, кроме посещения страниц "Сотрудники" и "Недвивжимость",
  а также нет прав на удаление жилых объектов, и просмотр статистики расходов и доходов.
descriptionRoleEmployee: >-
  Имеет право только на просмотр страниц жилья, бронирования (в том числе создание брони) и коммунальные услуги (в том числе редактирование).
  А также просмотр карточек статуса жилья и истекающая аренда.
